name: activity workflow
on: 
  pull_request: 
    types:
      - opened
      - edited

jobs:
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: test node js version
        run: node --version
      - name: install dependencies
        run: npm ci
      - name: run unit test
        run: npm run test